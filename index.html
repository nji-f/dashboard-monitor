<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJI - Final Dashboard</title>
    <style>
        :root { --bg: #0a0a0c; --card: #161618; --blue: #00d4ff; --green: #00ff41; --red: #ff3131; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 600px; }
        h1 { font-size: 1.2rem; color: var(--blue); text-align: center; letter-spacing: 2px; margin-bottom: 25px; text-shadow: 0 0 10px var(--blue); }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .stat { font-size: 1.6rem; font-weight: bold; font-family: monospace; margin-top: 5px; }
        .full { grid-column: span 2; }
        .power-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #222; border-color: #666; }
        .console { background: #000; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .console-header { background: #1a1a1a; padding: 8px 12px; font-size: 0.7rem; display: flex; justify-content: space-between; color: #888; }
        #log-box { height: 280px; padding: 12px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.75rem; color: var(--green); line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>NJI COMMAND CENTER</h1>
    
    <div class="dashboard">
        <div class="card full"><span>SERVER STATUS</span><div id="status">--</div></div>
        <div class="card"><span>CPU USAGE</span><div id="cpu" class="stat" style="color: var(--blue)">0%</div></div>
        <div class="card"><span>RAM USAGE</span><div id="ram" class="stat" style="color: var(--green)">0 MB</div></div>
    </div>

    <div class="power-group">
        <button onclick="power('start')" class="btn">START</button>
        <button onclick="power('restart')" class="btn">RESTART</button>
        <button onclick="power('stop')" class="btn">STOP</button>
    </div>

    <div class="console">
        <div class="console-header">
            <span>TERMINAL OUTPUT</span>
            <span id="socket-status" style="color: var(--red)">OFFLINE</span>
        </div>
        <div id="log-box"></div>
    </div>
</div>

<script>
    let socket;

    async function init() {
        appendLog("Bypassing provider restriction...");
        try {
            const res = await fetch('/api/get-auth');
            const result = await res.json();
            
            // Mengambil URL socket dari data yang muncul di screenshot kamu
            let wsUrl = result.data.socket;
            const token = result.data.token;

            // STRATEGI BYPASS VPN: Gunakan port 443 jika 8080 diblokir
            if (wsUrl.includes(':8080')) {
                appendLog("Port 8080 detected. Forcing Secure HTTPS Tunnel...");
                wsUrl = wsUrl.replace(':8080', ''); 
            }

            connect(wsUrl, token);
        } catch (err) {
            appendLog("System Error: Check Vercel API status.");
        }
    }

    function connect(url, token) {
        if (socket) socket.close();
        socket = new WebSocket(url);
        const statusEl = document.getElementById('socket-status');

        socket.onopen = () => {
            socket.send(JSON.stringify({"event":"auth","args":[token]}));
            statusEl.innerText = "CONNECTED (SECURE)";
            statusEl.style.color = "var(--green)";
            appendLog("Tunnel established. Monitoring live...");
        };

        socket.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.event === 'stats') {
                const s = JSON.parse(msg.args[0]);
                document.getElementById('cpu').innerText = s.cpu_absolute.toFixed(1) + '%';
                document.getElementById('ram').innerText = (s.memory_bytes/1024/1024).toFixed(0) + ' MB';
                document.getElementById('status').innerText = s.state.toUpperCase();
            }
            if (msg.event === 'console output') appendLog(msg.args[0]);
        };

        socket.onerror = () => appendLog("Network restricted. Checking alternative path...");
        socket.onclose = () => {
            statusEl.innerText = "RECONNECTING...";
            setTimeout(init, 5000);
        };
    }

    async function power(sig) {
        appendLog(`Signal: ${sig.toUpperCase()}`);
        await fetch('/api/power', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ signal: sig })
        });
    }

    function appendLog(t) {
        const b = document.getElementById('log-box');
        const l = document.createElement('div');
        l.textContent = "> " + t;
        b.appendChild(l);
        b.scrollTop = b.scrollHeight;
        if (b.childNodes.length > 50) b.removeChild(b.firstChild);
    }

    init();
</script>
</body>
</html>
