<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJI - System Monitor</title>
    <style>
        :root { --bg: #0d0d0f; --card: #1a1a1d; --blue: #00d4ff; --green: #00ff41; --red: #ff3131; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 500px; }
        h1 { font-size: 1.1rem; color: var(--blue); text-align: center; letter-spacing: 3px; margin-bottom: 25px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); text-align: center; }
        .full { grid-column: span 2; }
        .stat { font-size: 1.4rem; font-weight: bold; font-family: monospace; margin-top: 5px; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: #222; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .console { background: #000; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; }
        .header { background: #1a1a1a; padding: 10px 15px; font-size: 0.7rem; display: flex; justify-content: space-between; }
        #log-box { height: 220px; padding: 12px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; color: var(--green); line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>NJI MONITOR</h1>
    <div class="dashboard">
        <div class="card full"><div>SERVER STATUS</div><div id="status" class="stat">--</div></div>
        <div class="card"><div>CPU</div><div id="cpu" class="stat" style="color: var(--blue)">0%</div></div>
        <div class="card"><div>RAM</div><div id="ram" class="stat" style="color: var(--green)">0 MB</div></div>
    </div>
    <div class="btn-group">
        <button onclick="power('start')" class="btn">START</button>
        <button onclick="power('restart')" class="btn">RESTART</button>
        <button onclick="power('stop')" class="btn">STOP</button>
    </div>
    <div class="console">
        <div class="header"><span>TERMINAL</span><span id="socket-status">DISCONNECTED</span></div>
        <div id="log-box"></div>
    </div>
</div>

<script>
    let socket;
    async function init() {
        appendLog("Menghubungkan ke API Vercel...");
        try {
            const res = await fetch('/api/get-auth');
            const result = await res.json();
            if (!result.data) throw new Error("Gagal ambil token");

            const token = result.data.token;
            let wsUrl = result.data.socket;

            // Jika masih gagal tanpa VPN, kita paksa hapus port 8080
            if (wsUrl.includes(':8080')) {
                appendLog("Provider memblokir Port 8080. Mencoba jalur alternatif...");
                wsUrl = wsUrl.replace(':8080', ''); 
            }

            connect(wsUrl, token);
        } catch (err) {
            appendLog("Error: " + err.message);
        }
    }

    function connect(url, token) {
        if (socket) socket.close();
        socket = new WebSocket(url);
        socket.onopen = () => {
            socket.send(JSON.stringify({"event":"auth","args":[token]}));
            document.getElementById('socket-status').innerText = "CONNECTED";
            document.getElementById('socket-status').style.color = "var(--green)";
            appendLog("Koneksi berhasil tanpa VPN!");
        };
        socket.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.event === 'stats') {
                const s = JSON.parse(msg.args[0]);
                document.getElementById('cpu').innerText = s.cpu_absolute.toFixed(1) + '%';
                document.getElementById('ram').innerText = (s.memory_bytes/1024/1024).toFixed(0) + ' MB';
                document.getElementById('status').innerText = s.state.toUpperCase();
            }
            if (msg.event === 'console output') appendLog(msg.args[0]);
        };
        socket.onerror = () => appendLog("Jaringan kamu memblokir akses ke server.");
        socket.onclose = () => {
            document.getElementById('socket-status').innerText = "DISCONNECTED";
            setTimeout(init, 5000);
        };
    }

    async function power(sig) {
        appendLog("Signal: " + sig.toUpperCase());
        await fetch('/api/power', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ signal: sig })
        });
    }

    function appendLog(t) {
        const b = document.getElementById('log-box');
        const l = document.createElement('div');
        l.textContent = "> " + t;
        b.appendChild(l);
        b.scrollTop = b.scrollHeight;
    }
    init();
</script>
</body>
</html>
