<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJI - Project Monitor</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: rgba(26, 26, 26, 0.8);
            --neon-blue: #00d4ff;
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .stat-value { font-size: 1.8rem; font-weight: bold; margin-top: 10px; font-family: monospace; }
        #cpu { color: var(--neon-blue); }
        #ram { color: var(--neon-green); }

        .power-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-start { background: #00ff4133; color: var(--neon-green); border: 1px solid var(--neon-green); }
        .btn-restart { background: #00d4ff33; color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .btn-stop { background: #ff313133; color: var(--neon-red); border: 1px solid var(--neon-red); }

        .console {
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .log-box {
            height: 300px; padding: 15px; overflow-y: auto;
            font-family: monospace; font-size: 0.85rem; color: var(--neon-green);
        }
    </style>
</head>
<body>

    <h1 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">COMMAND CENTER</h1>

    <div class="dashboard">
        <div class="card"><h3>Status</h3><div id="status">--</div></div>
        <div class="card"><h3>CPU</h3><div id="cpu" class="stat-value">0%</div></div>
        <div class="card"><h3>RAM</h3><div id="ram" class="stat-value">0 MB</div></div>
    </div>

    <div class="power-actions">
        <button onclick="sendPower('start')" class="btn btn-start">START</button>
        <button onclick="sendPower('restart')" class="btn btn-restart">RESTART</button>
        <button onclick="sendPower('stop')" class="btn btn-stop">STOP</button>
    </div>

    <div class="console">
        <div style="background: #1a1a1a; padding: 8px 15px; font-size: 0.8rem;">TERMINAL</div>
        <div id="log-box" class="log-box"></div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('/api/get-auth');
                const json = await res.json();
                const socket = new WebSocket(json.data.socket);

                socket.onopen = () => {
                    socket.send(JSON.stringify({"event":"auth","args":[json.data.token]}));
                    appendLog("System Connected.");
                };

                socket.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.event === 'stats') {
                        const s = JSON.parse(msg.args[0]);
                        document.getElementById('cpu').innerText = s.cpu_absolute.toFixed(2) + '%';
                        document.getElementById('ram').innerText = (s.memory_bytes/1024/1024).toFixed(2) + ' MB';
                        document.getElementById('status').innerText = s.state.toUpperCase();
                    }
                    if (msg.event === 'console output') appendLog(msg.args[0]);
                };
            } catch (err) { appendLog("Connection Error."); }
        }

        async function sendPower(sig) {
            appendLog(`Signal: ${sig.toUpperCase()}...`);
            await fetch('/api/power', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ signal: sig })
            });
        }

        function appendLog(t) {
            const b = document.getElementById('log-box');
            const l = document.createElement('div');
            l.textContent = "> " + t;
            b.appendChild(l);
            b.scrollTop = b.scrollHeight;
        }

        init();
    </script>
</body>
</html>
