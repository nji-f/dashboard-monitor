<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJI - Final Monitor</title>
    <style>
        :root { --bg: #0a0a0c; --card: #161618; --blue: #00d4ff; --green: #00ff41; --red: #ff3131; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 600px; }
        h1 { font-size: 1.2rem; color: var(--blue); text-align: center; letter-spacing: 2px; margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .stat { font-size: 1.5rem; font-weight: bold; font-family: monospace; margin-top: 5px; }
        .full-card { grid-column: span 2; }
        .power-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-start:active { border-color: var(--green); color: var(--green); }
        .console { background: #000; border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        .console-header { background: #1a1a1a; padding: 8px 12px; font-size: 0.7rem; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        #log-box { height: 250px; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; color: var(--green); line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>SYSTEM MONITOR</h1>
    
    <div class="dashboard">
        <div class="card full-card">
            <span style="font-size: 0.7rem; color: #888;">SERVER STATUS</span>
            <div id="status" class="stat">--</div>
        </div>
        <div class="card">
            <span style="font-size: 0.7rem; color: #888;">CPU</span>
            <div id="cpu" class="stat" style="color: var(--blue)">0%</div>
        </div>
        <div class="card">
            <span style="font-size: 0.7rem; color: #888;">RAM</span>
            <div id="ram" class="stat" style="color: var(--green)">0 MB</div>
        </div>
    </div>

    <div class="power-group">
        <button onclick="power('start')" class="btn">START</button>
        <button onclick="power('restart')" class="btn">RESTART</button>
        <button onclick="power('stop')" class="btn">STOP</button>
    </div>

    <div class="console">
        <div class="console-header">
            <span>TERMINAL</span>
            <span id="socket-status" style="color: var(--red)">OFFLINE</span>
        </div>
        <div id="log-box"></div>
    </div>
</div>

<script>
    let socket;

    async function init() {
        appendLog("Initializing connection...");
        try {
            const res = await fetch('/api/get-auth');
            const result = await res.json();

            // Sesuai screenshot kamu, data ada di result.data.socket
            const token = result.data?.token;
            const wsUrl = result.data?.socket;

            if (!token || !wsUrl) {
                appendLog("Error: Invalid API response format.");
                return;
            }

            connectWS(wsUrl, token);
        } catch (err) {
            appendLog("Fetch Error: Check your Vercel logs.");
        }
    }

    function connectWS(url, token) {
        if (socket) socket.close();
        socket = new WebSocket(url);
        
        const statusEl = document.getElementById('socket-status');

        socket.onopen = () => {
            socket.send(JSON.stringify({"event":"auth","args":[token]}));
            statusEl.innerText = "CONNECTED";
            statusEl.style.color = "var(--green)";
            appendLog("Link established successfully.");
        };

        socket.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.event === 'stats') {
                const s = JSON.parse(msg.args[0]);
                document.getElementById('cpu').innerText = s.cpu_absolute.toFixed(1) + '%';
                document.getElementById('ram').innerText = (s.memory_bytes/1024/1024).toFixed(0) + ' MB';
                document.getElementById('status').innerText = s.state.toUpperCase();
            }
            if (msg.event === 'console output') appendLog(msg.args[0]);
        };

        socket.onerror = () => {
            appendLog("Connection Refused. Try using a VPN or different network.");
        };

        socket.onclose = () => {
            statusEl.innerText = "RECONNECTING...";
            setTimeout(init, 5000);
        };
    }

    async function power(sig) {
        appendLog("Command: " + sig.toUpperCase());
        try {
            await fetch('/api/power', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ signal: sig })
            });
        } catch (err) {
            appendLog("Power command failed.");
        }
    }

    function appendLog(t) {
        const b = document.getElementById('log-box');
        const l = document.createElement('div');
        l.textContent = "> " + t;
        b.appendChild(l);
        b.scrollTop = b.scrollHeight;
    }

    init();
</script>
</body>
</html>
