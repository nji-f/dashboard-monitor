<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJI - System Monitor</title>
    <style>
        :root { --bg: #0a0a0c; --card: #161618; --blue: #00d4ff; --green: #00ff41; --red: #ff3131; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 800px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat { font-size: 1.8rem; font-weight: bold; margin-top: 10px; font-family: monospace; }
        .btn-group { display: flex; gap: 10px; width: 100%; max-width: 800px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid transparent; }
        .btn-start { color: var(--green); border-color: var(--green); background: #00ff4111; }
        .btn-stop { color: var(--red); border-color: var(--red); background: #ff313111; }
        .console { width: 100%; max-width: 800px; background: #000; border-radius: 8px; border: 1px solid #333; }
        #log-box { height: 300px; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; color: var(--green); }
    </style>
</head>
<body>
    <h1 style="color: var(--blue)">SYSTEM MONITOR</h1>
    <div class="dashboard">
        <div class="card"><div>STATUS</div><div id="status">--</div></div>
        <div class="card"><div>CPU</div><div id="cpu" class="stat" style="color: var(--blue)">0%</div></div>
        <div class="card"><div>RAM</div><div id="ram" class="stat" style="color: var(--green)">0 MB</div></div>
    </div>
    <div class="btn-group">
        <button onclick="power('start')" class="btn btn-start">START</button>
        <button onclick="power('restart')" class="btn" style="color: var(--blue); border-color: var(--blue); background: #00d4ff11;">RESTART</button>
        <button onclick="power('stop')" class="btn btn-stop">STOP</button>
    </div>
    <div class="console">
        <div style="background: #1a1a1a; padding: 5px 15px; font-size: 0.7rem; display: flex; justify-content: space-between;">
            <span>TERMINAL</span><span id="socket-status">CONNECTING...</span>
        </div>
        <div id="log-box"></div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('/api/get-auth');
                const json = await res.json();
                const socket = new WebSocket(json.data.socket);

                socket.onopen = () => {
                    socket.send(JSON.stringify({"event":"auth","args":[json.data.token]}));
                    document.getElementById('socket-status').innerText = "CONNECTED";
                    appendLog("System Link Established.");
                };

                socket.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.event === 'stats') {
                        const s = JSON.parse(msg.args[0]);
                        document.getElementById('cpu').innerText = s.cpu_absolute.toFixed(2) + '%';
                        document.getElementById('ram').innerText = (s.memory_bytes/1024/1024).toFixed(2) + ' MB';
                        document.getElementById('status').innerText = s.state.toUpperCase();
                    }
                    if (msg.event === 'console output') appendLog(msg.args[0]);
                };
                
                socket.onclose = () => setTimeout(init, 5000);
            } catch (err) { appendLog("Connection Failed. Retrying..."); }
        }

        async function power(sig) {
            appendLog("Sending signal: " + sig.toUpperCase());
            await fetch('/api/power', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ signal: sig })
            });
        }

        function appendLog(t) {
            const b = document.getElementById('log-box');
            const l = document.createElement('div');
            l.textContent = "> " + t;
            b.appendChild(l);
            b.scrollTop = b.scrollHeight;
        }

        init();
    </script>
</body>
</html>
